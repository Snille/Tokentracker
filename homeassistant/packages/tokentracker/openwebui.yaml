# Open WebUI statistics for the Token Tracker.
# TokenTracker HA package version: 1.1.0
#
# Requires a bearer token from an admin account in Open WebUI. Add to secrets.yaml:
#   openwebui_bearer: "Bearer eyJhbGciOi..."
#   openwebui_users_url:     "http://llm.snille.net:8080/api/v1/users/"
#   openwebui_chats_url:     "http://llm.snille.net:8080/api/v1/chats/all/db"
#   openwebui_analytics_url: "http://llm.snille.net:8080/api/v1/analytics/users"
#   openwebui_tokens_today_url: >-
#     http://llm.snille.net:8080/api/v1/analytics/tokens?start_date={{ now().replace(hour=0, minute=0, second=0, microsecond=0).timestamp() | int }}&end_date={{ now().timestamp() | int }}
#
# Endpoints used (verified against the live API):
#   GET /api/v1/users/           -> { users: [ { id, name, last_active_at, ... } ], ... }
#   GET /api/v1/chats/all/db     -> [ { chat: { models: [...] }, updated_at, created_at, ... }, ... ]
#   GET /api/v1/analytics/users  -> { users: [ { name, count, input_tokens, output_tokens, total_tokens } ] }
#   GET /api/v1/analytics/tokens -> { total_input_tokens, total_output_tokens, total_tokens, models: [...] }
#
# Open WebUI has no native "currently connected" endpoint - active_users is
# inferred from last_active_at within the last 5 minutes.
#
# All metrics are computed directly in value_template against value_json, since
# HA's json_attributes does not work when the JSON root is an array.

rest:
  - resource: !secret openwebui_users_url
    method: GET
    scan_interval: 60
    headers:
      Authorization: !secret openwebui_bearer
      Content-Type: application/json
    sensor:
      - name: OpenWebUI Total Users
        unique_id: tokentracker_openwebui_total_users
        icon: mdi:account-group
        value_template: "{{ value_json.users | length }}"

      # Active = users whose last_active_at is within the last 5 minutes.
      - name: OpenWebUI Active Users
        unique_id: tokentracker_openwebui_active_users
        unit_of_measurement: users
        state_class: measurement
        icon: mdi:account-multiple-check
        value_template: >
          {% set cutoff = (now().timestamp() | int) - 300 %}
          {% set ns = namespace(c=0) %}
          {% for u in value_json.users %}
            {% if (u.last_active_at | default(0) | int(0)) >= cutoff %}
              {% set ns.c = ns.c + 1 %}
            {% endif %}
          {% endfor %}
          {{ ns.c }}

  - resource: !secret openwebui_chats_url
    method: GET
    scan_interval: 300
    timeout: 30
    headers:
      Authorization: !secret openwebui_bearer
      Content-Type: application/json
    sensor:
      - name: OpenWebUI Total Chats
        unique_id: tokentracker_openwebui_total_chats
        unit_of_measurement: chats
        state_class: measurement
        icon: mdi:message-text-outline
        value_template: "{{ value_json | length }}"

      - name: OpenWebUI Chats Today
        unique_id: tokentracker_openwebui_chats_today
        unit_of_measurement: chats
        state_class: measurement
        icon: mdi:message-text
        value_template: >
          {% set today = now().replace(hour=0, minute=0, second=0, microsecond=0).timestamp() | int %}
          {% set ns = namespace(c=0) %}
          {% for chat in value_json %}
            {% set ts = chat.updated_at | default(chat.created_at) | default(0) | int(0) %}
            {% if ts >= today %}{% set ns.c = ns.c + 1 %}{% endif %}
          {% endfor %}
          {{ ns.c }}

      - name: OpenWebUI Top Model
        unique_id: tokentracker_openwebui_top_model
        icon: mdi:trophy-outline
        value_template: >
          {% set tally = namespace(d={}) %}
          {% for chat in value_json %}
            {% for m in chat.chat.models | default([]) %}
              {% set tally.d = dict(tally.d, **{m: tally.d.get(m, 0) + 1}) %}
            {% endfor %}
          {% endfor %}
          {% if tally.d | length == 0 %}
            unknown
          {% else %}
            {{ (tally.d.items() | sort(attribute=1, reverse=true) | list)[0][0] }}
          {% endif %}

      - name: OpenWebUI Models Used Week
        unique_id: tokentracker_openwebui_models_used_week
        unit_of_measurement: models
        state_class: measurement
        icon: mdi:robot-happy-outline
        value_template: >
          {% set cutoff = (now().timestamp() | int) - 7 * 86400 %}
          {% set ns = namespace(models=[]) %}
          {% for chat in value_json %}
            {% set ts = chat.updated_at | default(chat.created_at) | default(0) | int(0) %}
            {% if ts >= cutoff %}
              {% for m in chat.chat.models | default([]) %}
                {% if m and m not in ns.models %}{% set ns.models = ns.models + [m] %}{% endif %}
              {% endfor %}
            {% endif %}
          {% endfor %}
          {{ ns.models | length }}

  # Aggregate token + message counts per user. Returns
  # { users: [ { user_id, name, count, input_tokens, output_tokens, total_tokens } ] }.
  - resource: !secret openwebui_analytics_url
    method: GET
    scan_interval: 300
    headers:
      Authorization: !secret openwebui_bearer
      Content-Type: application/json
    sensor:
      - name: OpenWebUI Messages Total
        unique_id: tokentracker_openwebui_messages_total
        unit_of_measurement: msg
        state_class: total_increasing
        icon: mdi:comment-multiple-outline
        value_template: >
          {% set ns = namespace(c=0) %}
          {% for u in value_json.users %}{% set ns.c = ns.c + (u.count | default(0) | int(0)) %}{% endfor %}
          {{ ns.c }}

      - name: OpenWebUI Tokens Total
        unique_id: tokentracker_openwebui_tokens_total
        unit_of_measurement: tokens
        state_class: total_increasing
        icon: mdi:counter
        value_template: >
          {% set ns = namespace(t=0) %}
          {% for u in value_json.users %}{% set ns.t = ns.t + (u.total_tokens | default(0) | int(0)) %}{% endfor %}
          {{ ns.t }}

  # Daily token usage from midnight local time until now. This is a better
  # activity metric for one-person Open WebUI instances than active user count.
  - resource_template: !secret openwebui_tokens_today_url
    method: GET
    scan_interval: 300
    headers:
      Authorization: !secret openwebui_bearer
      Content-Type: application/json
    sensor:
      - name: OpenWebUI Tokens Today
        unique_id: tokentracker_openwebui_tokens_today
        unit_of_measurement: tokens
        state_class: measurement
        icon: mdi:counter
        value_template: "{{ value_json.total_tokens | default(0) | int(0) }}"

      - name: OpenWebUI Input Tokens Today
        unique_id: tokentracker_openwebui_input_tokens_today
        unit_of_measurement: tokens
        state_class: measurement
        icon: mdi:arrow-down-bold-circle-outline
        value_template: "{{ value_json.total_input_tokens | default(0) | int(0) }}"

      - name: OpenWebUI Output Tokens Today
        unique_id: tokentracker_openwebui_output_tokens_today
        unit_of_measurement: tokens
        state_class: measurement
        icon: mdi:arrow-up-bold-circle-outline
        value_template: "{{ value_json.total_output_tokens | default(0) | int(0) }}"
