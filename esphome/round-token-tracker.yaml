# Top button on GPIO0 (also the boot-strap pin; we explicitly silence the
# warning). The press/release handlers implement click + long-hold handling
# in conjunction with the 100 ms interval below.
# Single click pauses/resumes auto-rotate and long hold toggles the display.
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO0
      mode: INPUT_PULLUP
      ignore_strapping_warning: true
      inverted: true
    id: top_button
    name: Top Button
    on_press:
      - lambda: |-
          // Record press start; reset hold/wake flags ready for this gesture.
          id(button_press_started_ms) = millis();
          id(button_hold_handled) = false;
          id(button_woke_display) = false;
          // If display is currently off, treat this press purely as a wake event
          // and do not act on it as a click.
          if (!id(display_enabled).state) {
            ESP_LOGI("tokentracker", "Top button wake display");
            id(display_enabled).turn_on();
            id(main_display).update();
            id(button_woke_display) = true;
            id(button_hold_handled) = true;
          }
          ESP_LOGI("tokentracker", "Top button press started");
    on_release:
      - lambda: |-
          const uint32_t now = millis();
          const uint32_t held_ms = id(button_press_started_ms) == 0 ? 0 : now - id(button_press_started_ms);
          ESP_LOGI("tokentracker", "Top button released after %u ms", held_ms);
          id(button_press_started_ms) = 0;
          // Skip click processing if the press was already consumed (wake or
          // long-hold), or if it was held long enough to count as a hold.
          if (id(button_woke_display) || id(button_hold_handled) || held_ms >= 800) {
            return;
          }
          if (id(auto_rotate).state) {
            id(auto_rotate_paused) = !id(auto_rotate_paused);
            if (!id(auto_rotate_paused)) id(last_auto_advance_ms) = now;
            ESP_LOGI("tokentracker", "Top button click -> auto-rotate %s", id(auto_rotate_paused) ? "paused" : "resumed");
          } else {
            ESP_LOGI("tokentracker", "Top button click ignored: auto-rotate switch is off");
          }
          id(main_display).update();

# Periodic tasks. Four independent intervals:
#   1) 100 ms - button hold detection.
#   2) 1 s    - IMU read + auto-orientation handling.
#   3) 1 s    - configured Codex/Claude 5h token-window baseline tracking.
#   4) 1 s    - auto-rotate of screens.
interval:
  - interval: 100ms
    then:
      - lambda: |-
          const uint32_t now = millis();
          // Detect a long hold (>=800 ms) while button is still pressed.
          if (id(top_button).state && id(button_press_started_ms) != 0 && !id(button_hold_handled)) {
            const uint32_t held_ms = now - id(button_press_started_ms);
            if (held_ms >= 800) {
              ESP_LOGI("tokentracker", "Top button hold -> toggle display");
              if (id(display_enabled).state) {
                id(display_enabled).turn_off();
              } else {
                id(display_enabled).turn_on();
              }
              id(main_display).update();
              id(button_hold_handled) = true;
            }
          }

  # Read the IMU once per second and run the auto-orientation classifier based
  # on gravity vector direction.
  - interval: 1s
    then:
      - lambda: |-
          const uint32_t now_ms = millis();
          float temperature = NAN;
          float x = NAN;
          float y = NAN;
          float z = NAN;
          float gx = NAN;
          float gy = NAN;
          float gz = NAN;

          // Bulk-read 14 bytes starting at register 0x33: temp(2) + accel xyz(6) + gyro xyz(6).
          uint8_t qmi_data[14];
          auto qmi_err = id(qmi8658_use_alt_address)
            ? id(qmi8658_i2c_alt).read_register(0x33, qmi_data, sizeof(qmi_data))
            : id(qmi8658_i2c).read_register(0x33, qmi_data, sizeof(qmi_data));
          if (qmi_err == esphome::i2c::ERROR_OK) {
            // Combine LSB+MSB into a signed 16-bit value (little-endian).
            auto raw16 = [](uint8_t lo, uint8_t hi) -> int16_t {
              return (int16_t) ((uint16_t) lo | ((uint16_t) hi << 8));
            };
            const int16_t raw_temp = raw16(qmi_data[0], qmi_data[1]);
            const int16_t raw_ax = raw16(qmi_data[2], qmi_data[3]);
            const int16_t raw_ay = raw16(qmi_data[4], qmi_data[5]);
            const int16_t raw_az = raw16(qmi_data[6], qmi_data[7]);
            const int16_t raw_gx = raw16(qmi_data[8], qmi_data[9]);
            const int16_t raw_gy = raw16(qmi_data[10], qmi_data[11]);
            const int16_t raw_gz = raw16(qmi_data[12], qmi_data[13]);
            // Scale according to the configured full-scale ranges:
            //   temp: 1/256 degC per LSB
            //   accel: +/-8g -> 4096 LSB/g
            //   gyro:  +/-512dps -> 64 LSB/dps
            temperature = raw_temp / 256.0f;
            x = raw_ax / 4096.0f;
            y = raw_ay / 4096.0f;
            z = raw_az / 4096.0f;
            gx = raw_gx / 64.0f;
            gy = raw_gy / 64.0f;
            gz = raw_gz / 64.0f;

            // Publish to HA at most every 10 s to avoid spamming the API.
            if (id(qmi8658_last_publish_ms) == 0 || now_ms - id(qmi8658_last_publish_ms) >= 10000) {
              id(qmi8658_last_publish_ms) = now_ms;
              id(imu_temperature).publish_state(temperature);
              id(imu_accel_x).publish_state(x);
              id(imu_accel_y).publish_state(y);
              id(imu_accel_z).publish_state(z);
              id(imu_gyro_x).publish_state(gx);
              id(imu_gyro_y).publish_state(gy);
              id(imu_gyro_z).publish_state(gz);
            }
          } else {
            ESP_LOGW("tokentracker", "QMI8658 data read failed: %d", (int) qmi_err);
          }

          // Auto-orientation disabled -> reset any applied offset and exit.
          if (!id(auto_orientation).state) {
            if (id(auto_orientation_steps) != 0) {
              id(auto_orientation_steps) = 0;
              id(main_display).update();
            }
            return;
          }
          if (isnan(x) || isnan(y)) {
            ESP_LOGW("tokentracker", "Auto orientation skipped: IMU acceleration is NaN");
            return;
          }

          // Dead zone near 0g on both axes (device lying flat) - keep last orientation.
          const float ax = fabsf(x);
          const float ay = fabsf(y);
          if (ax < 0.45f && ay < 0.45f) return;

          // Pick the dominant gravity axis to determine which edge is "down".
          int detected = id(auto_orientation_steps);
          if (ax > ay) {
            detected = x > 0.0f ? 1 : 3;
          } else {
            detected = y > 0.0f ? 2 : 0;
          }

          // Apply only on changes, to avoid redundant redraws.
          if (detected != id(auto_orientation_steps)) {
            ESP_LOGI("tokentracker", "Auto orientation step changed %d -> %d (x=%.3f y=%.3f)", id(auto_orientation_steps), detected, x, y);
            id(auto_orientation_steps) = detected;
            id(main_display).update();
          }

  # Codex/Claude 5h windows are anchored from HA-configurable start times.
  # The display keeps per-period baselines against weekly counters.
  - interval: 1s
    then:
      - lambda: |-
          auto now = id(home_assistant_time).now();
          if (!now.is_valid()) return;

          auto safe_value = [](float value) -> float {
            return isnan(value) ? 0.0f : value;
          };

          auto configured_start_minutes = [](float hour_value, float minute_value) -> int {
            int hour = isnan(hour_value) ? 0 : (int) hour_value;
            int minute = isnan(minute_value) ? 0 : (int) minute_value;
            if (hour < 0) hour = 0;
            if (hour >= 24) hour = 0;
            if (minute < 0) minute = 0;
            if (minute > 59) minute = 59;
            return hour * 60 + minute;
          };

          auto reset_anchor = [&](int start_minutes) -> int {
            const int start_seconds_of_day = start_minutes * 60;
            const int now_seconds_of_day = now.hour * 3600 + now.minute * 60 + now.second;
            int anchor = (int) now.timestamp - now_seconds_of_day + start_seconds_of_day;
            while (anchor > (int) now.timestamp) anchor -= 24 * 60 * 60;
            return anchor;
          };

          auto current_period_index = [&](int anchor_ts) -> int {
            const int64_t period_seconds = 5LL * 60LL * 60LL;
            int64_t period_start = anchor_ts;
            if (period_start <= 0) period_start = reset_anchor(0);
            if (period_start > (int64_t) now.timestamp) {
              int64_t periods_back = ((period_start - (int64_t) now.timestamp) / period_seconds) + 1;
              period_start -= periods_back * period_seconds;
            }
            int64_t periods_since_anchor = ((int64_t) now.timestamp - period_start) / period_seconds;
            period_start += periods_since_anchor * period_seconds;
            return (int) (period_start / 60LL);
          };

          if (!isnan(id(openai_tokens_week).state)) {
            const int codex_start_minutes = configured_start_minutes(id(codex_5h_start_hour).state, id(codex_5h_start_minute).state);
            if (id(codex_period_anchor_ts) <= 0 || id(codex_period_start_minutes) != codex_start_minutes) {
              id(codex_period_anchor_ts) = reset_anchor(codex_start_minutes);
              id(codex_period_start_minutes) = codex_start_minutes;
              id(codex_period_index) = -1;
            }
            const int codex_index = current_period_index(id(codex_period_anchor_ts));
            if (id(codex_period_index) != codex_index || safe_value(id(openai_tokens_week).state) < id(codex_period_total_baseline)) {
              id(codex_period_index) = codex_index;
              id(codex_period_total_baseline) = safe_value(id(openai_tokens_week).state);
              id(codex_period_input_baseline) = safe_value(id(openai_input_tokens_week).state);
              id(codex_period_cached_baseline) = safe_value(id(openai_cached_input_tokens_week).state);
              id(codex_period_output_baseline) = safe_value(id(openai_output_tokens_week).state);
              id(codex_period_reasoning_baseline) = safe_value(id(openai_reasoning_output_tokens_week).state);
              ESP_LOGI("tokentracker", "Codex 5h period reset at index %d", codex_index);
            }
          }

          if (!isnan(id(anthropic_tokens_week).state)) {
            const int claude_start_minutes = configured_start_minutes(id(claude_5h_start_hour).state, id(claude_5h_start_minute).state);
            if (id(claude_period_anchor_ts) <= 0 || id(claude_period_start_minutes) != claude_start_minutes) {
              id(claude_period_anchor_ts) = reset_anchor(claude_start_minutes);
              id(claude_period_start_minutes) = claude_start_minutes;
              id(claude_period_index) = -1;
            }
            const int claude_index = current_period_index(id(claude_period_anchor_ts));
            if (id(claude_period_index) != claude_index || safe_value(id(anthropic_tokens_week).state) < id(claude_period_total_baseline)) {
              id(claude_period_index) = claude_index;
              id(claude_period_total_baseline) = safe_value(id(anthropic_tokens_week).state);
              id(claude_period_input_baseline) = safe_value(id(anthropic_input_tokens_week).state);
              id(claude_period_cache_creation_baseline) = safe_value(id(anthropic_cache_creation_tokens_week).state);
              id(claude_period_cache_read_baseline) = safe_value(id(anthropic_cache_read_tokens_week).state);
              id(claude_period_output_baseline) = safe_value(id(anthropic_output_tokens_week).state);
              ESP_LOGI("tokentracker", "Claude 5h period reset at index %d", claude_index);
            }
          }

  # Auto-rotate carousel: single screens use Screen Interval, overview uses
  # Overview Screen Interval.
  - interval: 1s
    then:
      - lambda: |-
          if (!id(auto_rotate).state || id(auto_rotate_paused)) return;
          const uint32_t now = millis();
          float interval_seconds = id(current_screen) >= 5 ? id(overview_screen_interval_seconds).state : id(screen_interval_seconds).state;
          if (isnan(interval_seconds) || interval_seconds <= 0.0f) interval_seconds = 10.0f;
          const uint32_t interval_ms = (uint32_t) (interval_seconds * 1000.0f);
          if (id(last_auto_advance_ms) == 0) {
            id(last_auto_advance_ms) = now;
            return;
          }
          if (now - id(last_auto_advance_ms) < interval_ms) return;
          auto enabled = [](int screen) -> bool {
            if (screen == 0) return id(show_clock).state;
            if (screen == 1) return id(show_openai).state;
            if (screen == 2) return id(show_anthropic).state;
            if (screen == 3) return id(show_openrouter).state;
            if (screen == 4) return id(show_openwebui).state;
            if (screen == 5) return id(show_overview).state;
            if (screen == 6) return id(show_overview).state;
            if (screen == 7) return id(show_overview).state;
            return false;
          };
          for (int i = 0; i < 8; i++) {
            id(current_screen) = (id(current_screen) + 1) % 8;
            if (enabled(id(current_screen))) break;
          }
          id(last_auto_advance_ms) = now;
      - component.update: main_display

# 466x466 round AMOLED display driven over Quad-SPI. The lambda below is the
# entire drawing routine - re-run every update_interval.
display:
  - platform: mipi_spi
    id: main_display
    model: CO5300
    bus_mode: quad
    spi_id: display_qspi
    cs_pin: GPIO12
    reset_pin: GPIO39
    rotation: 180
    dimensions:
      width: 466
      height: 466
    color_order: RGB
    invert_colors: false
    brightness: 255
    update_interval: 250ms
    lambda: |-
      const auto black = Color(0, 0, 0);
      // Combine manual + auto-orientation rotation, modulo 4 (0/90/180/270 deg).
      const int effective_rotation_steps = (id(display_rotation_steps) + id(auto_orientation_steps)) % 4;
      // Only call set_rotation() when the value actually changed.
      if (id(applied_display_rotation_steps) != effective_rotation_steps) {
        if (effective_rotation_steps == 1) {
          it.set_rotation(esphome::display::DISPLAY_ROTATION_90_DEGREES);
        } else if (effective_rotation_steps == 2) {
          it.set_rotation(esphome::display::DISPLAY_ROTATION_180_DEGREES);
        } else if (effective_rotation_steps == 3) {
          it.set_rotation(esphome::display::DISPLAY_ROTATION_270_DEGREES);
        } else {
          it.set_rotation(esphome::display::DISPLAY_ROTATION_0_DEGREES);
        }
        id(applied_display_rotation_steps) = effective_rotation_steps;
      }

      // Display "off" -> just paint solid black.
      if (!id(display_enabled).state) {
        it.fill(black);
        return;
      }
      // Palette used by the UI.
      const auto white = Color(255, 255, 255);
      const auto muted = Color(150, 158, 170);
      const auto green = Color(89, 220, 156);
      const auto blue = Color(96, 165, 250);
      const auto amber = Color(245, 180, 84);
      const auto red = Color(248, 113, 113);

      // First few frames after boot are forced black to hide any garbage
      // framebuffer contents before the real UI is rendered.
      if (id(startup_black_frames) > 0) {
        it.fill(black);
        id(startup_black_frames) -= 1;
        return;
      }

      // Identity coordinate mapping. Kept as a hook in case a coordinate
      // transform is reintroduced later.
      auto map_point = [](int x, int y) -> std::pair<int, int> {
        return {x, y};
      };

      auto text_align = [](TextAlign align) -> TextAlign {
        return align;
      };

      // Thin wrappers around the display drawing primitives so they go through
      // map_point() and text_align(). _r = "rotated/remapped".
      auto line_r = [&](int x1, int y1, int x2, int y2, Color color) {
        auto p1 = map_point(x1, y1);
        auto p2 = map_point(x2, y2);
        it.line(p1.first, p1.second, p2.first, p2.second, color);
      };

      auto circle_r = [&](int x, int y, int radius, Color color) {
        auto p = map_point(x, y);
        it.circle(p.first, p.second, radius, color);
      };

      auto filled_circle_r = [&](int x, int y, int radius, Color color) {
        auto p = map_point(x, y);
        it.filled_circle(p.first, p.second, radius, color);
      };

      auto rect_r = [&](int x, int y, int width, int height, Color color) {
        auto p = map_point(x, y);
        it.rectangle(p.first, p.second, width, height, color);
      };

      auto filled_rect_r = [&](int x, int y, int width, int height, Color color) {
        auto p = map_point(x, y);
        it.filled_rectangle(p.first, p.second, width, height, color);
      };

      auto image_r = [&](int x, int y, esphome::image::Image *image) {
        auto p = map_point(x, y);
        it.image(p.first, p.second, image, ImageAlign::CENTER);
      };

      auto printf_r = [&](int x, int y, auto font, Color color, TextAlign align, const char *format, auto... args) {
        auto p = map_point(x, y);
        it.printf(p.first, p.second, font, color, text_align(align), format, args...);
      };

      auto strftime_r = [&](int x, int y, auto font, Color color, TextAlign align, const char *format, auto time) {
        auto p = map_point(x, y);
        it.strftime(p.first, p.second, font, color, text_align(align), format, time);
      };

      // Whether a screen index is currently visible per its toggle switch.
      auto enabled = [](int screen) -> bool {
        if (screen == 0) return id(show_clock).state;
        if (screen == 1) return id(show_openai).state;
        if (screen == 2) return id(show_anthropic).state;
        if (screen == 3) return id(show_openrouter).state;
        if (screen == 4) return id(show_openwebui).state;
        if (screen == 5) return id(show_overview).state;
        if (screen == 6) return id(show_overview).state;
        if (screen == 7) return id(show_overview).state;
        return false;
      };
      // Fallback if the user just disabled the screen we were showing.
      if (!enabled(id(current_screen))) {
        for (int i = 0; i < 8; i++) {
          id(current_screen) = (id(current_screen) + 1) % 8;
          if (enabled(id(current_screen))) break;
        }
      }

      // String formatters for the three value styles shown on the UI.
      auto money = [](float value) -> std::string {
        if (isnan(value)) return "--";
        char buffer[20];
        snprintf(buffer, sizeof(buffer), "$%.2f", value);
        return std::string(buffer);
      };

      auto tokens = [](float value) -> std::string {
        if (isnan(value)) return "--";
        char buffer[20];
        if (value >= 1000000.0f) {
          snprintf(buffer, sizeof(buffer), "%.2fM", value / 1000000.0f);
        } else if (value >= 10000.0f) {
          snprintf(buffer, sizeof(buffer), "%.1fK", value / 1000.0f);
        } else {
          snprintf(buffer, sizeof(buffer), "%.0f", value);
        }
        return std::string(buffer);
      };

      auto percent = [](float value) -> std::string {
        if (isnan(value)) return "--";
        char buffer[20];
        snprintf(buffer, sizeof(buffer), "%.1f%%", value);
        return std::string(buffer);
      };

      auto usage_from_goal = [](float used, float goal) -> float {
        if (isnan(used) || isnan(goal) || goal <= 0.0f) return 0.0f;
        return used * 100.0f / goal;
      };

      auto remaining_percent = [](float used_percent) -> float {
        if (isnan(used_percent)) return 0.0f;
        float pct = 100.0f - used_percent;
        if (pct < 0.0f) pct = 0.0f;
        if (pct > 100.0f) pct = 100.0f;
        return pct;
      };

      auto openrouter_today_credit_percent = [&](float cost_today, float balance_remaining, float used_percent) -> float {
        if (isnan(cost_today) || cost_today <= 0.0f) return 0.0f;
        if (isnan(balance_remaining) || balance_remaining <= 0.0f) return 0.0f;
        if (isnan(used_percent) || used_percent < 0.0f || used_percent >= 100.0f) return 0.0f;
        const float total_credits = balance_remaining / (1.0f - used_percent / 100.0f);
        return usage_from_goal(cost_today, total_credits);
      };

      auto left_from_goal = [](float used, float goal) -> float {
        if (isnan(goal) || goal <= 0.0f) return 0.0f;
        if (isnan(used)) used = 0.0f;
        float left = goal - used;
        return left > 0.0f ? left : 0.0f;
      };

      auto weekly_goal_from_5h_goal = [](float goal_5h) -> float {
        if (isnan(goal_5h) || goal_5h <= 0.0f) return 0.0f;
        return goal_5h * (168.0f / 5.0f);
      };

      auto period_reset_label = [](int period_index_minutes) -> std::string {
        if (period_index_minutes < 0) return "--:--";
        int minutes = (period_index_minutes + 300) % 1440;
        if (minutes < 0) minutes += 1440;
        char buffer[8];
        snprintf(buffer, sizeof(buffer), "%02d:%02d", minutes / 60, minutes % 60);
        return std::string(buffer);
      };

      auto vscode_data_age_seconds = [&]() -> int {
        auto now = id(home_assistant_time).now();
        float updated = id(vscode_updated_at_epoch).state;
        if (!now.is_valid() || isnan(updated) || updated <= 0.0f) return -1;
        return (int) now.timestamp - (int) updated;
      };

      auto vscode_data_age_label = [&]() -> std::string {
        int age = vscode_data_age_seconds();
        if (age < 0) return "Upd --";
        if (age < 60) return "Upd now";
        char buffer[16];
        if (age < 3600) {
          snprintf(buffer, sizeof(buffer), "Upd %dm", age / 60);
        } else {
          snprintf(buffer, sizeof(buffer), "Upd %dh", age / 3600);
        }
        return std::string(buffer);
      };

      auto vscode_data_stale = [&]() -> bool {
        int age = vscode_data_age_seconds();
        return age < 0 || age > 600;
      };

      auto weekly_projection = [&](float week_total) -> float {
        auto now = id(home_assistant_time).now();
        if (!now.is_valid() || isnan(week_total)) return 0.0f;
        int days_since_monday = (now.day_of_week + 5) % 7;
        int elapsed = days_since_monday * 86400 + now.hour * 3600 + now.minute * 60 + now.second;
        if (elapsed < 3600) return week_total;
        return week_total * 604800.0f / (float) elapsed;
      };

      auto ktokens_to_tokens = [](float ktokens) -> float {
        if (isnan(ktokens) || ktokens <= 0.0f) return 0.0f;
        return ktokens * 1000.0f;
      };

      auto auto_rotate_remaining_percent = [&]() -> float {
        if (!id(auto_rotate).state) return 0.0f;
        float interval_seconds = id(current_screen) >= 5 ? id(overview_screen_interval_seconds).state : id(screen_interval_seconds).state;
        if (isnan(interval_seconds) || interval_seconds <= 0.0f) return 0.0f;
        const uint32_t interval_ms = (uint32_t) (interval_seconds * 1000.0f);
        if (interval_ms == 0 || id(last_auto_advance_ms) == 0) return 100.0f;
        uint32_t elapsed_ms = millis() - id(last_auto_advance_ms);
        if (elapsed_ms >= interval_ms) return 0.0f;
        return 100.0f - ((float) elapsed_ms * 100.0f / (float) interval_ms);
      };

      // Full 360-degree usage ring along the edge of the display.
      // Drawn as two passes: a muted background dotted track, then an accent
      // arc filled from the top (12 o'clock) up to `pct` percent of the way around.
      auto draw_progress_ring = [&](float usage_percent, Color accent) {
        const int cx = 233;
        const int cy = 233;
        const int radius = 216;
        const int thickness = 10;
        float pct = isnan(usage_percent) ? 0.0f : usage_percent;
        if (pct < 0.0f) pct = 0.0f;
        if (pct > 100.0f) pct = 100.0f;

        // Background track.
        for (int step = 0; step < 360; step += 2) {
          float angle = (step - 90.0f) * M_PI / 180.0f;
          int x = cx + (int) (radius * cos(angle));
          int y = cy + (int) (radius * sin(angle));
          filled_circle_r(x, y, 4, Color(31, 36, 45));
        }

        // Accent fill: 100% -> 360 degrees, so 3.6 deg per percent.
        int filled_steps = (int) (pct * 3.6f);
        for (int step = 0; step <= filled_steps; step += 2) {
          float angle = (step - 90.0f) * M_PI / 180.0f;
          int x = cx + (int) (radius * cos(angle));
          int y = cy + (int) (radius * sin(angle));
          filled_circle_r(x, y, thickness / 2, accent);
        }
      };

      auto draw_ring_arc = [&](int start_deg, int end_deg, float usage_percent, Color accent) {
        const int cx = 233;
        const int cy = 233;
        const int radius = 216;
        const int thickness = 10;
        float pct = isnan(usage_percent) ? 0.0f : usage_percent;
        if (pct < 0.0f) pct = 0.0f;
        if (pct > 100.0f) pct = 100.0f;

        const int direction = end_deg >= start_deg ? 1 : -1;
        const int span = abs(end_deg - start_deg);
        const int filled_span = (int) (span * (pct / 100.0f));

        for (int offset = 0; offset <= span; offset += 2) {
          int step = start_deg + direction * offset;
          float angle = (step - 90.0f) * M_PI / 180.0f;
          int x = cx + (int) (radius * cos(angle));
          int y = cy + (int) (radius * sin(angle));
          filled_circle_r(x, y, 4, Color(31, 36, 45));
        }

        for (int offset = 0; offset <= filled_span; offset += 2) {
          int step = start_deg + direction * offset;
          float angle = (step - 90.0f) * M_PI / 180.0f;
          int x = cx + (int) (radius * cos(angle));
          int y = cy + (int) (radius * sin(angle));
          filled_circle_r(x, y, thickness / 2, accent);
        }
      };

      auto draw_split_usage_ring = [&](float usage_5h_percent, float weekly_usage_percent, Color accent) {
        // Top half: current configured 5h window, left -> top -> right.
        draw_ring_arc(270, 450, usage_5h_percent, accent);
        // Bottom half: weekly usage, left -> bottom -> right.
        draw_ring_arc(270, 90, weekly_usage_percent, blue);
      };

      // Inner countdown ring for auto-rotate. It starts full after each screen
      // change and drains counter-clockwise until the next automatic switch.
      auto draw_auto_rotate_timer_ring = [&]() {
        if (!id(auto_rotate).state || id(auto_rotate_paused)) return;
        const int cx = 233;
        const int cy = 233;
        const int radius = 206;
        const auto timer_track = Color(13, 24, 39);
        const auto timer_blue = Color(21, 38, 108);
        float pct = auto_rotate_remaining_percent();
        if (pct < 0.0f) pct = 0.0f;
        if (pct > 100.0f) pct = 100.0f;

        for (int step = 0; step < 360; step += 3) {
          float angle = (step - 90.0f) * M_PI / 180.0f;
          int x = cx + (int) (radius * cos(angle));
          int y = cy + (int) (radius * sin(angle));
          filled_circle_r(x, y, 2, timer_track);
        }

        int filled_steps = (int) (pct * 3.6f);
        for (int step = 0; step <= filled_steps; step += 3) {
          float angle = (step - 90.0f) * M_PI / 180.0f;
          int x = cx + (int) (radius * cos(angle));
          int y = cy + (int) (radius * sin(angle));
          filled_circle_r(x, y, 3, timer_blue);
        }
      };

      // 90-degree usage arc spanning [start_deg, end_deg]. Used by the
      // overview screen to render four account quadrants plus a center clock.
      auto draw_quarter_usage_arc = [&](int start_deg, int end_deg, float usage_percent, Color accent) {
        float pct = isnan(usage_percent) ? 0.0f : usage_percent;
        if (pct < 0.0f) pct = 0.0f;
        if (pct > 100.0f) pct = 100.0f;
        const int cx = 233;
        const int cy = 233;
        const int radius = 216;
        const int filled_end = start_deg + (int) ((end_deg - start_deg) * (pct / 100.0f));

        for (int step = start_deg; step <= end_deg; step += 2) {
          float angle = step * M_PI / 180.0f;
          int x = cx + (int) (radius * cos(angle));
          int y = cy + (int) (radius * sin(angle));
          filled_circle_r(x, y, 4, Color(31, 36, 45));
        }
        for (int step = start_deg; step <= filled_end; step += 2) {
          float angle = step * M_PI / 180.0f;
          int x = cx + (int) (radius * cos(angle));
          int y = cy + (int) (radius * sin(angle));
          filled_circle_r(x, y, 5, accent);
        }
      };

      // Clock-face seconds indicator: 60 background "ticks" + an accent arc
      // proportional to the current second (0..59 maps to 0..354 degrees).
      auto draw_seconds_ring = [&](int second, Color accent) {
        const int cx = 233;
        const int cy = 233;
        const int radius = 216;
        const int thickness = 10;
        int safe_second = second;
        if (safe_second < 0) safe_second = 0;
        if (safe_second > 59) safe_second = 59;

        for (int step = 0; step < 360; step += 6) {
          float angle = (step - 90.0f) * M_PI / 180.0f;
          int x = cx + (int) (radius * cos(angle));
          int y = cy + (int) (radius * sin(angle));
          filled_circle_r(x, y, 4, Color(31, 36, 45));
        }

        for (int step = 0; step <= safe_second * 6; step += 2) {
          float angle = (step - 90.0f) * M_PI / 180.0f;
          int x = cx + (int) (radius * cos(angle));
          int y = cy + (int) (radius * sin(angle));
          filled_circle_r(x, y, thickness / 2, accent);
        }
      };

      // Pagination dots near the bottom showing which screen is active.
      // Hidden when only one screen is enabled (nothing to navigate).
      auto draw_footer = [&](int screen, Color accent) {
        const int y = screen >= 5 ? 430 : 406;
        int visible = 0;
        for (int i = 0; i < 8; i++) visible += enabled(i) ? 1 : 0;
        if (visible <= 1) return;
        int x = 233 - ((visible - 1) * 12);
        for (int i = 0; i < 8; i++) {
          if (!enabled(i)) continue;
          int radius = screen >= 5 ? (i == screen ? 7 : 4) : (i == screen ? 5 : 3);
          filled_circle_r(x, y, radius, i == screen ? accent : muted);
          x += 24;
        }
      };

      auto draw_overview_clock = [&](auto now) {
        const int cx = 233;
        const int cy = 233;
        const int radius = 42;
        filled_circle_r(cx, cy, radius, Color(12, 14, 18));
        circle_r(cx, cy, radius, Color(57, 65, 80));
        circle_r(cx, cy, radius - 5, Color(31, 36, 45));

        for (int tick = 0; tick < 12; tick++) {
          float angle = (tick * 30.0f - 90.0f) * M_PI / 180.0f;
          int x = cx + (int) ((radius - 8) * cos(angle));
          int y = cy + (int) ((radius - 8) * sin(angle));
          filled_circle_r(x, y, tick % 3 == 0 ? 2 : 1, muted);
        }

        int hour = 0;
        int minute = 0;
        int second = 0;
        if (now.is_valid()) {
          hour = now.hour % 12;
          minute = now.minute;
          second = now.second;
        }
        float hour_angle = ((hour + minute / 60.0f) * 30.0f - 90.0f) * M_PI / 180.0f;
        float minute_angle = ((minute + second / 60.0f) * 6.0f - 90.0f) * M_PI / 180.0f;
        float second_angle = (second * 6.0f - 90.0f) * M_PI / 180.0f;

        line_r(cx, cy, cx + (int) (20 * cos(hour_angle)), cy + (int) (20 * sin(hour_angle)), white);
        line_r(cx, cy, cx + (int) (30 * cos(minute_angle)), cy + (int) (30 * sin(minute_angle)), Color(190, 198, 214));
        line_r(cx, cy, cx + (int) (34 * cos(second_angle)), cy + (int) (34 * sin(second_angle)), Color(248, 113, 113));
        filled_circle_r(cx, cy, 4, white);
      };

      // Compact tile (logo + label + value + percent) used in the overview screen.
      auto draw_overview_tile = [&](int cx, int cy, const char *name, esphome::image::Image *logo, const char *value, float usage_percent, Color accent) {
        image_r(cx, cy - 42, logo);
        printf_r(cx, cy + 8, id(font_tiny), muted, TextAlign::CENTER, "%s", name);
        printf_r(cx, cy + 43, id(font_small_value), accent, TextAlign::CENTER, "%s", value);
        printf_r(cx, cy + 72, id(font_tiny), white, TextAlign::CENTER, "%s", percent(usage_percent).c_str());
      };

      auto safe_value = [](float value) -> float {
        return isnan(value) ? 0.0f : value;
      };

      auto period_delta = [&](float current, float baseline) -> float {
        if (isnan(current)) return 0.0f;
        float delta = current - safe_value(baseline);
        return delta > 0.0f ? delta : 0.0f;
      };

      auto codex_5h_total = [&]() -> float {
        return period_delta(id(openai_tokens_week).state, id(codex_period_total_baseline));
      };
      auto codex_5h_input = [&]() -> float {
        return period_delta(id(openai_input_tokens_week).state, id(codex_period_input_baseline));
      };
      auto codex_5h_cached = [&]() -> float {
        return period_delta(id(openai_cached_input_tokens_week).state, id(codex_period_cached_baseline));
      };
      auto codex_5h_output = [&]() -> float {
        return period_delta(id(openai_output_tokens_week).state, id(codex_period_output_baseline));
      };
      auto codex_5h_reasoning = [&]() -> float {
        return period_delta(id(openai_reasoning_output_tokens_week).state, id(codex_period_reasoning_baseline));
      };
      auto claude_5h_total = [&]() -> float {
        return period_delta(id(anthropic_tokens_week).state, id(claude_period_total_baseline));
      };
      auto claude_5h_input = [&]() -> float {
        return period_delta(id(anthropic_input_tokens_week).state, id(claude_period_input_baseline));
      };
      auto claude_5h_cache_creation = [&]() -> float {
        return period_delta(id(anthropic_cache_creation_tokens_week).state, id(claude_period_cache_creation_baseline));
      };
      auto claude_5h_cache_read = [&]() -> float {
        return period_delta(id(anthropic_cache_read_tokens_week).state, id(claude_period_cache_read_baseline));
      };
      auto claude_5h_output = [&]() -> float {
        return period_delta(id(anthropic_output_tokens_week).state, id(claude_period_output_baseline));
      };

      auto draw_split_bar = [&](int x, int y, int width, int height, float left_value, float right_value, Color left_color, Color right_color) {
        float left = safe_value(left_value);
        float right = safe_value(right_value);
        float total = left + right;
        filled_rect_r(x, y, width, height, Color(31, 36, 45));
        if (total <= 0.0f) {
          rect_r(x, y, width, height, Color(57, 65, 80));
          return;
        }
        int left_width = (int) ((left / total) * width);
        if (left_width < 0) left_width = 0;
        if (left_width > width) left_width = width;
        if (left_width > 0) filled_rect_r(x, y, left_width, height, left_color);
        if (left_width < width) filled_rect_r(x + left_width, y, width - left_width, height, right_color);
        rect_r(x, y, width, height, Color(57, 65, 80));
      };

      auto draw_vertical_center_bar = [&](int x, int inner_y, int outer_y, int width, float usage_percent, Color accent) {
        float pct = isnan(usage_percent) ? 0.0f : usage_percent;
        if (pct < 0.0f) pct = 0.0f;
        if (pct > 100.0f) pct = 100.0f;
        const int y = inner_y < outer_y ? inner_y : outer_y;
        const int height = abs(outer_y - inner_y);
        filled_rect_r(x - width / 2, y, width, height, Color(31, 36, 45));
        int fill = (int) (height * (pct / 100.0f));
        if (fill > 0) {
          if (outer_y < inner_y) {
            filled_rect_r(x - width / 2, inner_y - fill, width, fill, accent);
          } else {
            filled_rect_r(x - width / 2, inner_y, width, fill, accent);
          }
        }
        rect_r(x - width / 2, y, width, height, Color(57, 65, 80));
      };

      auto draw_stat_pair = [&](int y, const char *left_label, const char *left_value, Color left_color, const char *right_label, const char *right_value, Color right_color) {
        printf_r(154, y, id(font_tiny), muted, TextAlign::CENTER, "%s", left_label);
        printf_r(154, y + 23, id(font_label), left_color, TextAlign::CENTER, "%s", left_value);
        printf_r(312, y, id(font_tiny), muted, TextAlign::CENTER, "%s", right_label);
        printf_r(312, y + 23, id(font_label), right_color, TextAlign::CENTER, "%s", right_value);
      };

      auto draw_stale_badge = [&]() {
        if (!vscode_data_stale()) return;
        printf_r(233, 394, id(font_tiny), red, TextAlign::CENTER, "VS Code stale");
      };

      auto draw_provider_shell = [&](const char *name, esphome::image::Image *logo, float usage_percent, Color accent) {
        it.fill(black);
        filled_circle_r(233, 233, 208, Color(12, 14, 18));
        draw_progress_ring(usage_percent, accent);
        draw_auto_rotate_timer_ring();
        circle_r(233, 233, 206, Color(42, 47, 58));
        image_r(233, 56, logo);
        printf_r(233, 108, id(font_small_value), white, TextAlign::CENTER, "%s", name);
      };

      auto draw_provider_shell_compact = [&](const char *name, esphome::image::Image *logo, float usage_percent, Color accent) {
        it.fill(black);
        filled_circle_r(233, 233, 208, Color(12, 14, 18));
        draw_progress_ring(usage_percent, accent);
        draw_auto_rotate_timer_ring();
        circle_r(233, 233, 206, Color(42, 47, 58));
        image_r(233, 68, logo);
        printf_r(233, 120, id(font_small_value), white, TextAlign::CENTER, "%s", name);
      };

      auto draw_token_provider_shell = [&](const char *name, esphome::image::Image *logo, float usage_5h_percent, float weekly_usage_percent, Color accent) {
        it.fill(black);
        filled_circle_r(233, 233, 208, Color(12, 14, 18));
        draw_split_usage_ring(usage_5h_percent, weekly_usage_percent, accent);
        draw_auto_rotate_timer_ring();
        circle_r(233, 233, 206, Color(42, 47, 58));
        image_r(233, 68, logo);
        printf_r(233, 120, id(font_small_value), white, TextAlign::CENTER, "%s", name);
      };

      auto draw_token_detail_account = [&](const char *name, esphome::image::Image *logo, float total, float input, float output, float cached, float reasoning, float week_total, float goal, const char *reset_label, Color accent) {
        float pct = usage_from_goal(total, goal);
        float week_pct = usage_from_goal(week_total, weekly_goal_from_5h_goal(goal));
        draw_token_provider_shell(name, logo, pct, week_pct, accent);
        printf_r(233, 150, id(font_tiny), muted, TextAlign::CENTER, "Tokens / 5h");
        printf_r(233, 184, id(font_title), accent, TextAlign::CENTER, "%s", tokens(total).c_str());
        printf_r(118, 203, id(font_tiny), green, TextAlign::LEFT, "Input");
        printf_r(348, 203, id(font_tiny), red, TextAlign::RIGHT, "Output");
        draw_split_bar(126, 230, 214, 7, input, output, green, red);
        draw_stat_pair(255, "Input", tokens(input).c_str(), green, "Output", tokens(output).c_str(), red);
        draw_stat_pair(303, "Cached", tokens(cached).c_str(), blue, "Reason", tokens(reasoning).c_str(), amber);
        draw_stat_pair(351, "Week", tokens(week_total).c_str(), white, "Reset", reset_label, accent);
        draw_stale_badge();
      };

      auto draw_router_detail_account = [&]() {
        float usage_pct = id(openrouter_usage_percent).state;
        draw_provider_shell_compact("OpenRouter", id(img_openrouter_small), usage_pct, blue);
        printf_r(233, 150, id(font_tiny), muted, TextAlign::CENTER, "Balance left");
        printf_r(233, 184, id(font_title), blue, TextAlign::CENTER, "%s", money(id(openrouter_balance_remaining).state).c_str());
        printf_r(118, 203, id(font_tiny), green, TextAlign::LEFT, "Prompt");
        printf_r(348, 203, id(font_tiny), red, TextAlign::RIGHT, "Completion");
        draw_split_bar(126, 230, 214, 7, id(openrouter_activity_prompt_tokens).state, id(openrouter_activity_completion_tokens).state, green, red);
        draw_stat_pair(255, "Today", money(id(openrouter_cost_today).state).c_str(), green, "Keys", tokens(id(openrouter_key_count).state).c_str(), white);
        draw_stat_pair(303, "Hist In", tokens(id(openrouter_activity_prompt_tokens).state).c_str(), green, "Hist Out", tokens(id(openrouter_activity_completion_tokens).state).c_str(), red);
        draw_stat_pair(351, "Month", money(id(openrouter_cost_month).state).c_str(), blue, "Req", tokens(id(openrouter_activity_requests).state).c_str(), amber);
      };

      auto draw_openwebui_detail_account = [&]() {
        float tokens_today = id(openwebui_tokens_today).state;
        float goal = ktokens_to_tokens(id(openwebui_daily_token_goal).state);
        float pct = usage_from_goal(tokens_today, goal);
        draw_provider_shell_compact("Open WebUI", id(img_openwebui_small), pct, red);
        printf_r(233, 150, id(font_tiny), muted, TextAlign::CENTER, "Tokens today");
        printf_r(233, 184, id(font_title), red, TextAlign::CENTER, "%s", tokens(tokens_today).c_str());
        printf_r(118, 203, id(font_tiny), green, TextAlign::LEFT, "Input");
        printf_r(348, 203, id(font_tiny), red, TextAlign::RIGHT, "Output");
        draw_split_bar(126, 230, 214, 7, id(openwebui_input_tokens_today).state, id(openwebui_output_tokens_today).state, green, red);
        draw_stat_pair(255, "Input", tokens(id(openwebui_input_tokens_today).state).c_str(), green, "Output", tokens(id(openwebui_output_tokens_today).state).c_str(), red);
        draw_stat_pair(303, "Chats", tokens(id(openwebui_chats_today).state).c_str(), amber, "Models", tokens(id(openwebui_models_today).state).c_str(), blue);
        draw_stat_pair(351, "Active", tokens(id(openwebui_active_users).state).c_str(), white, "Use", percent(pct).c_str(), red);
      };

      auto draw_overview_metric = [&](int cx, int cy, const char *label, const char *value, Color color) {
        printf_r(cx, cy, id(font_tiny), muted, TextAlign::CENTER, "%s", label);
        printf_r(cx, cy + 23, id(font_label), color, TextAlign::CENTER, "%s", value);
      };

      // Full-screen layout for token-based accounts (Codex, Claude Code):
      // dark disc, progress ring along the edge, brand logo on top, large
      // tokens-left value and a usage percentage at the bottom.
      auto draw_token_account = [&](const char *name, esphome::image::Image *logo, float tokens_left, float usage_percent, const char *usage_label, Color accent) {
        it.fill(black);
        filled_circle_r(233, 233, 208, Color(12, 14, 18));
        draw_progress_ring(usage_percent, accent);
        draw_auto_rotate_timer_ring();
        circle_r(233, 233, 206, Color(42, 47, 58));
        image_r(233, 78, logo);
        printf_r(233, 137, id(font_title), white, TextAlign::CENTER, "%s", name);
        printf_r(233, 202, id(font_label), muted, TextAlign::CENTER, "Tokens left");
        printf_r(233, 246, id(font_value), accent, TextAlign::CENTER, "%s", tokens(tokens_left).c_str());
        printf_r(233, 306, id(font_label), muted, TextAlign::CENTER, "%s", usage_label);
        printf_r(233, 346, id(font_title), white, TextAlign::CENTER, "%s", percent(usage_percent).c_str());
      };

      // Same as draw_token_account but for money-denominated accounts (OpenRouter).
      auto draw_money_account = [&](const char *name, esphome::image::Image *logo, float balance, float usage_percent, Color accent) {
        it.fill(black);
        filled_circle_r(233, 233, 208, Color(12, 14, 18));
        draw_progress_ring(usage_percent, accent);
        draw_auto_rotate_timer_ring();
        circle_r(233, 233, 206, Color(42, 47, 58));
        image_r(233, 78, logo);
        printf_r(233, 137, id(font_title), white, TextAlign::CENTER, "%s", name);
        printf_r(233, 202, id(font_label), muted, TextAlign::CENTER, "Balance left");
        printf_r(233, 246, id(font_value), accent, TextAlign::CENTER, "%s", money(balance).c_str());
        printf_r(233, 306, id(font_label), muted, TextAlign::CENTER, "Credits used");
        printf_r(233, 346, id(font_title), white, TextAlign::CENTER, "%s", percent(usage_percent).c_str());
      };

      // Self-hosted Open WebUI screen. Progress ring shows today's tokens as a
      // fraction of the adjustable daily goal. Bottom value is chats today.
      auto draw_openwebui_account = [&](float tokens_today, float chats_today, float daily_goal) {
        it.fill(black);
        filled_circle_r(233, 233, 208, Color(12, 14, 18));
        float pct = usage_from_goal(tokens_today, daily_goal);
        draw_progress_ring(pct, red);
        draw_auto_rotate_timer_ring();
        circle_r(233, 233, 206, Color(42, 47, 58));
        image_r(233, 78, id(img_openwebui_compact));
        printf_r(233, 137, id(font_title), white, TextAlign::CENTER, "Open WebUI");
        printf_r(233, 202, id(font_label), muted, TextAlign::CENTER, "Tokens used");
        printf_r(233, 246, id(font_value), red, TextAlign::CENTER, "%s", tokens(tokens_today).c_str());
        printf_r(233, 306, id(font_label), muted, TextAlign::CENTER, "Chats today");
        printf_r(233, 346, id(font_title), white, TextAlign::CENTER, "%.0f", isnan(chats_today) ? 0.0f : chats_today);
      };

      // ===== Screen dispatch =====
      // Screen 0: Clock with seconds ring and weekday/date.
      if (id(current_screen) == 0) {
        it.fill(black);
        filled_circle_r(233, 233, 208, Color(10, 13, 16));
        auto now = id(home_assistant_time).now();
        draw_seconds_ring(now.is_valid() ? now.second : 0, green);
        draw_auto_rotate_timer_ring();
        circle_r(233, 233, 206, Color(42, 47, 58));
        if (now.is_valid()) {
          strftime_r(233, 214, id(font_clock), white, TextAlign::CENTER, "%H:%M", now);
          strftime_r(233, 280, id(font_label), muted, TextAlign::CENTER, "%A %d %b", now);
        } else {
          printf_r(233, 214, id(font_clock), white, TextAlign::CENTER, "--:--");
          printf_r(233, 280, id(font_label), muted, TextAlign::CENTER, "Waiting for HA time");
        }
        draw_footer(0, green);
        return;
      }

      // Screen 1: Codex (OpenAI) tokens, green accent.
      if (id(current_screen) == 1) {
        float codex_used = codex_5h_total();
        float codex_goal = ktokens_to_tokens(id(codex_daily_token_goal).state);
        draw_token_detail_account(
          "Codex",
          id(img_openai_small),
          codex_used,
          codex_5h_input(),
          codex_5h_output(),
          codex_5h_cached(),
          codex_5h_reasoning(),
          id(openai_tokens_week).state,
          codex_goal,
          period_reset_label(id(codex_period_index)).c_str(),
          green);
        draw_footer(1, green);
        return;
      }
      // Screen 2: Claude Code (Anthropic) tokens, amber accent.
      if (id(current_screen) == 2) {
        float claude_used = claude_5h_total();
        float claude_goal = ktokens_to_tokens(id(claude_daily_token_goal).state);
        draw_token_detail_account(
          "Claude Code",
          id(img_anthropic_small),
          claude_used,
          claude_5h_input(),
          claude_5h_output(),
          claude_5h_cache_read() + claude_5h_cache_creation(),
          0.0f,
          id(anthropic_tokens_week).state,
          claude_goal,
          period_reset_label(id(claude_period_index)).c_str(),
          amber);
        draw_footer(2, amber);
        return;
      }
      // Screen 3: OpenRouter remaining credit, blue accent.
      if (id(current_screen) == 3) {
        draw_router_detail_account();
        draw_footer(3, blue);
        return;
      }
      // Screen 4: Open WebUI self-hosted stats, red accent.
      if (id(current_screen) == 4) {
        draw_openwebui_detail_account();
        draw_footer(4, red);
        return;
      }
      // Screen 5: Overview - four account arcs + four small tiles + center clock.
      float codex_used = codex_5h_total();
      float codex_goal = ktokens_to_tokens(id(codex_daily_token_goal).state);
      float codex_pct = usage_from_goal(codex_used, codex_goal);
      float codex_week_pct = usage_from_goal(id(openai_tokens_week).state, weekly_goal_from_5h_goal(codex_goal));
      float claude_used = claude_5h_total();
      float claude_goal = ktokens_to_tokens(id(claude_daily_token_goal).state);
      float claude_pct = usage_from_goal(claude_used, claude_goal);
      float claude_week_pct = usage_from_goal(id(anthropic_tokens_week).state, weekly_goal_from_5h_goal(claude_goal));
      float owui_used = id(openwebui_tokens_today).state;
      float owui_goal = ktokens_to_tokens(id(openwebui_daily_token_goal).state);
      float owui_pct = usage_from_goal(owui_used, owui_goal);
      float router_remaining_pct = remaining_percent(id(openrouter_usage_percent).state);
      float router_today_pct = openrouter_today_credit_percent(id(openrouter_cost_today).state, id(openrouter_balance_remaining).state, id(openrouter_usage_percent).state);
      float owui_output_pct = safe_value(id(openwebui_output_token_percent_today).state);
      if (id(current_screen) == 5) {
        it.fill(black);
        filled_circle_r(233, 233, 208, Color(10, 13, 16));
        // Quadrant arcs: top-left=Codex, top-right=Claude, bottom-left=OpenRouter,
        // bottom-right=Open WebUI. (Angle 0 is at 3 o'clock, increasing CW.)
        draw_quarter_usage_arc(180, 270, codex_pct, green);
        draw_quarter_usage_arc(270, 360, claude_pct, amber);
        draw_quarter_usage_arc(90, 180, router_remaining_pct, blue);
        draw_quarter_usage_arc(0, 90, owui_pct, red);
        draw_auto_rotate_timer_ring();
        line_r(233, 32, 233, 434, Color(42, 47, 58));
        line_r(32, 233, 434, 233, Color(42, 47, 58));
        circle_r(233, 233, 206, Color(42, 47, 58));
        draw_overview_clock(id(home_assistant_time).now());
        draw_vertical_center_bar(208, 185, 86, 9, codex_week_pct, blue);
        draw_vertical_center_bar(258, 185, 86, 9, claude_week_pct, blue);
        draw_vertical_center_bar(208, 281, 380, 9, router_today_pct, blue);
        draw_vertical_center_bar(258, 281, 380, 9, owui_output_pct, red);
        printf_r(208, 76, id(font_tiny), blue, TextAlign::CENTER, "Wk");
        printf_r(258, 76, id(font_tiny), blue, TextAlign::CENTER, "Wk");
        printf_r(208, 396, id(font_tiny), blue, TextAlign::CENTER, "$");
        printf_r(258, 396, id(font_tiny), red, TextAlign::CENTER, "Out");
        draw_overview_tile(148, 135, "Codex", id(img_openai_small), tokens(codex_used).c_str(), codex_pct, green);
        draw_overview_tile(318, 135, "Claude", id(img_anthropic_small), tokens(claude_used).c_str(), claude_pct, amber);
        draw_overview_tile(148, 313, "Router", id(img_openrouter_small), money(id(openrouter_balance_remaining).state).c_str(), router_remaining_pct, blue);
        draw_overview_tile(318, 313, "WebUI", id(img_openwebui_small), tokens(owui_used).c_str(), owui_pct, red);
        draw_footer(5, white);
        return;
      }

      // Screen 6: I/O mix overview across all providers.
      if (id(current_screen) == 6) {
        it.fill(black);
        filled_circle_r(233, 233, 208, Color(10, 13, 16));
        draw_auto_rotate_timer_ring();
        circle_r(233, 233, 206, Color(42, 47, 58));
        printf_r(233, 74, id(font_title), white, TextAlign::CENTER, "I/O Mix");
        float total_input = codex_5h_input() + claude_5h_input() + id(openwebui_input_tokens_today).state + id(openrouter_activity_prompt_tokens).state;
        float total_output = codex_5h_output() + claude_5h_output() + id(openwebui_output_tokens_today).state + id(openrouter_activity_completion_tokens).state;
        float total_all = total_input + total_output;
        printf_r(233, 118, id(font_tiny), muted, TextAlign::CENTER, "All visible sources");
        printf_r(233, 162, id(font_title), white, TextAlign::CENTER, "%s", tokens(total_all).c_str());
        draw_split_bar(126, 192, 214, 7, total_input, total_output, green, red);
        draw_stat_pair(218, "Input", tokens(total_input).c_str(), green, "Output", tokens(total_output).c_str(), red);
        draw_stat_pair(276, "Cached", tokens(codex_5h_cached() + claude_5h_cache_creation() + claude_5h_cache_read()).c_str(), blue, "Reason", tokens(codex_5h_reasoning() + id(openrouter_activity_reasoning_tokens).state).c_str(), amber);
        draw_stat_pair(334, "Router $", money(id(openrouter_cost_today).state).c_str(), blue, "WebUI %", percent(id(openwebui_output_token_percent_today).state).c_str(), red);
        draw_footer(6, white);
        return;
      }

      // Screen 7: Activity overview with today's totals and provider balance.
      it.fill(black);
      filled_circle_r(233, 233, 208, Color(10, 13, 16));
      draw_auto_rotate_timer_ring();
      circle_r(233, 233, 206, Color(42, 47, 58));
      printf_r(233, 84, id(font_title), white, TextAlign::CENTER, "5h + Week");
      printf_r(233, 116, id(font_tiny), vscode_data_stale() ? red : muted, TextAlign::CENTER, "%s", vscode_data_age_label().c_str());
      float codex_left = left_from_goal(codex_used, codex_goal);
      float claude_left = left_from_goal(claude_used, claude_goal);
      float total_5h = codex_used + claude_used;
      float total_left = codex_left + claude_left;
      printf_r(233, 158, id(font_title), green, TextAlign::CENTER, "%s", tokens(total_5h).c_str());
      draw_overview_metric(154, 204, "5h used", tokens(total_5h).c_str(), green);
      draw_overview_metric(312, 204, "5h left", tokens(total_left).c_str(), white);
      draw_overview_metric(154, 262, "Codex wk", tokens(id(openai_tokens_week).state).c_str(), blue);
      draw_overview_metric(312, 262, "Claude wk", tokens(id(anthropic_tokens_week).state).c_str(), blue);
      draw_overview_metric(154, 320, "C pace", tokens(weekly_projection(id(openai_tokens_week).state)).c_str(), green);
      draw_overview_metric(312, 320, "Cl pace", tokens(weekly_projection(id(anthropic_tokens_week).state)).c_str(), amber);
      draw_stale_badge();
      draw_footer(7, white);
      return;

# CST9217 capacitive touchscreen. The on_touch / on_update / on_release
# handlers implement a swipe gesture detector that pages between screens.
touchscreen:
  - platform: cst9217
    id: touch_panel
    display: main_display
    interrupt_pin: GPIO11
    reset_pin: GPIO40
    transform:
      mirror_x: true
      mirror_y: true
      swap_xy: false
    on_touch:
      - lambda: |-
          const uint32_t now = millis();
          if (id(touch_is_active) && now - id(touch_started_ms) > 1000) {
            id(touch_is_active) = false;
          }
          // Lock the start point for the whole gesture. Some panels report
          // repeated on_touch events while dragging.
          if (!id(touch_is_active)) {
            id(swipe_start_x) = touch.x;
            id(swipe_start_y) = touch.y;
            id(touch_swipe_handled) = false;
            id(touch_is_active) = true;
            id(touch_started_ms) = now;
          }
          id(swipe_last_x) = touch.x;
          id(swipe_last_y) = touch.y;
    on_update:
      - lambda: |-
          // Detect swipes while the finger is moving; release events can arrive
          // without a useful final coordinate on this panel.
          const uint32_t now = millis();
          for (auto touch : touches) {
            if (touch.state > 2) continue;

            if (id(touch_is_active) && now - id(touch_started_ms) > 1000) {
              id(touch_is_active) = false;
            }

            if (!id(touch_is_active)) {
              id(swipe_start_x) = touch.x;
              id(swipe_start_y) = touch.y;
              id(touch_swipe_handled) = false;
              id(touch_is_active) = true;
              id(touch_started_ms) = now;
            }

            id(swipe_last_x) = touch.x;
            id(swipe_last_y) = touch.y;

            if (id(touch_swipe_handled)) continue;

            const int raw_dx = touch.x - id(swipe_start_x);
            const int raw_dy = touch.y - id(swipe_start_y);
            int dx = raw_dx;
            int dy = raw_dy;
            const int rotation_steps = (id(display_rotation_steps) + id(auto_orientation_steps)) % 4;
            if (rotation_steps == 1) {
              dx = raw_dy;
              dy = -raw_dx;
            } else if (rotation_steps == 2) {
              dx = -raw_dx;
              dy = -raw_dy;
            } else if (rotation_steps == 3) {
              dx = -raw_dy;
              dy = raw_dx;
            }
            const int abs_dx = abs(dx);
            const int abs_dy = abs(dy);
            const int swipe_threshold = 34;

            if (abs_dx < swipe_threshold || abs_dx < abs_dy * 1.20f) {
              continue;
            }

            auto enabled = [](int screen) -> bool {
              if (screen == 0) return id(show_clock).state;
              if (screen == 1) return id(show_openai).state;
              if (screen == 2) return id(show_anthropic).state;
              if (screen == 3) return id(show_openrouter).state;
              if (screen == 4) return id(show_openwebui).state;
              if (screen == 5) return id(show_overview).state;
              if (screen == 6) return id(show_overview).state;
              if (screen == 7) return id(show_overview).state;
              return false;
            };

            // Left swipe moves forward, right swipe moves backward.
            const bool forward = dx < 0;
            for (int i = 0; i < 8; i++) {
              id(current_screen) = forward ? (id(current_screen) + 1) % 8 : (id(current_screen) + 7) % 8;
              if (enabled(id(current_screen))) break;
            }

            id(touch_swipe_handled) = true;
            if (!id(auto_rotate_paused)) id(last_auto_advance_ms) = millis();
          }
    on_release:
      - lambda: |-
          if (id(touch_swipe_handled)) {
            id(touch_swipe_handled) = false;
            id(touch_is_active) = false;
            return;
          }

          // Horizontal swipes page left/right. Short taps are ignored so they
          // never steal an intended swipe. This is only a fallback if the panel
          // did not deliver enough movement updates while pressed.
          const int raw_dx = id(swipe_last_x) - id(swipe_start_x);
          const int raw_dy = id(swipe_last_y) - id(swipe_start_y);
          int dx = raw_dx;
          int dy = raw_dy;
          const int rotation_steps = (id(display_rotation_steps) + id(auto_orientation_steps)) % 4;
          if (rotation_steps == 1) {
            dx = raw_dy;
            dy = -raw_dx;
          } else if (rotation_steps == 2) {
            dx = -raw_dx;
            dy = -raw_dy;
          } else if (rotation_steps == 3) {
            dx = -raw_dy;
            dy = raw_dx;
          }
          const int abs_dx = abs(dx);
          const int abs_dy = abs(dy);
          const int swipe_threshold = 34;

          auto enabled = [](int screen) -> bool {
            if (screen == 0) return id(show_clock).state;
            if (screen == 1) return id(show_openai).state;
            if (screen == 2) return id(show_anthropic).state;
            if (screen == 3) return id(show_openrouter).state;
            if (screen == 4) return id(show_openwebui).state;
            if (screen == 5) return id(show_overview).state;
            if (screen == 6) return id(show_overview).state;
            if (screen == 7) return id(show_overview).state;
            return false;
          };

          id(touch_is_active) = false;

          if (abs_dx < swipe_threshold || abs_dx < abs_dy * 1.20f) {
            if (id(current_screen) == 5 && abs_dx < 18 && abs_dy < 18) {
              int tx = id(swipe_start_x);
              int ty = id(swipe_start_y);
              const int rotation_steps_for_tap = (id(display_rotation_steps) + id(auto_orientation_steps)) % 4;
              if (rotation_steps_for_tap == 1) {
                int old_tx = tx;
                tx = ty;
                ty = 465 - old_tx;
              } else if (rotation_steps_for_tap == 2) {
                tx = 465 - tx;
                ty = 465 - ty;
              } else if (rotation_steps_for_tap == 3) {
                int old_tx = tx;
                tx = 465 - ty;
                ty = old_tx;
              }
              int target = 4;
              if (tx < 233 && ty < 233) target = 1;
              else if (tx >= 233 && ty < 233) target = 2;
              else if (tx < 233 && ty >= 233) target = 3;
              if (enabled(target)) {
                id(current_screen) = target;
                if (!id(auto_rotate_paused)) id(last_auto_advance_ms) = millis();
                id(main_display).update();
              }
            } else if (id(current_screen) >= 1 && id(current_screen) <= 4 && abs_dx < 18 && abs_dy < 18 && enabled(5)) {
              id(current_screen) = 5;
              if (!id(auto_rotate_paused)) id(last_auto_advance_ms) = millis();
              id(main_display).update();
            }
            return;
          }

          // Left swipe moves forward, right swipe moves backward.
          const bool forward = dx < 0;

          // Walk forward or backward through the screens, skipping disabled ones.
          for (int i = 0; i < 8; i++) {
            id(current_screen) = forward ? (id(current_screen) + 1) % 8 : (id(current_screen) + 7) % 8;
            if (enabled(id(current_screen))) break;
          }
          // Reset the auto-rotate timer so the user gets a full dwell on the chosen screen.
          if (!id(auto_rotate_paused)) id(last_auto_advance_ms) = millis();
