  - platform: homeassistant
    id: openwebui_output_token_percent_today
    entity_id: ${openwebui_output_token_percent_today_entity}
  # Template sensors for the QMI8658 IMU. update_interval: never means values
  # only change when publish_state() is called from the 1s interval lambda.
  # Kept internal so ESPHome does not dump seven noisy sensor status lines.
  - platform: template
    id: imu_accel_x
    internal: true
    entity_category: diagnostic
    unit_of_measurement: g
    accuracy_decimals: 3
    update_interval: never
  - platform: template
    id: imu_accel_y
    internal: true
    entity_category: diagnostic
    unit_of_measurement: g
    accuracy_decimals: 3
    update_interval: never
  - platform: template
    id: imu_accel_z
    internal: true
    entity_category: diagnostic
    unit_of_measurement: g
    accuracy_decimals: 3
    update_interval: never
  - platform: template
    id: imu_gyro_x
    internal: true
    entity_category: diagnostic
    unit_of_measurement: °/s
    accuracy_decimals: 3
    update_interval: never
  - platform: template
    id: imu_gyro_y
    internal: true
    entity_category: diagnostic
    unit_of_measurement: °/s
    accuracy_decimals: 3
    update_interval: never
  - platform: template
    id: imu_gyro_z
    internal: true
    entity_category: diagnostic
    unit_of_measurement: °/s
    accuracy_decimals: 3
    update_interval: never
  - platform: template
    id: imu_temperature
    internal: true
    entity_category: diagnostic
    unit_of_measurement: °C
    accuracy_decimals: 1
    update_interval: never

# Top-model string sensor from Open WebUI - needs text_sensor since the value
# is a model id like "vendor/Model-Name:tag" rather than a number.
text_sensor:
  - platform: homeassistant
    id: openwebui_top_model
    entity_id: ${openwebui_top_model_entity}

# User-tunable number entities controlling auto-rotate cadence.
number:
  - platform: template
    id: screen_interval_seconds
    name: Screen Interval
    icon: mdi:timer-outline
    entity_category: config
    optimistic: true
    restore_value: true
    min_value: 3
    max_value: 120
    step: 1
    mode: slider
    initial_value: 10
    unit_of_measurement: s

  - platform: template
    id: overview_screen_interval_seconds
    name: Overview Screen Interval
    icon: mdi:view-dashboard-outline
    entity_category: config
    optimistic: true
    restore_value: true
    min_value: 3
    max_value: 300
    step: 1
    mode: slider
    initial_value: 20
    unit_of_measurement: s

  - platform: template
    id: display_brightness_percent
    name: Display Brightness Percent
    icon: mdi:brightness-6
    entity_category: config
    optimistic: true
    restore_value: true
    min_value: 1
    max_value: 100
    step: 1
    mode: slider
    initial_value: 70
    unit_of_measurement: "%"
    set_action:
      - lambda: |-
          float brightness_percent = x;
          if (brightness_percent < 1.0f) brightness_percent = 1.0f;
          if (brightness_percent > 100.0f) brightness_percent = 100.0f;
          id(main_display).set_brightness((uint8_t) (brightness_percent * 2.55f));

  - platform: template
    id: codex_daily_token_goal
    name: Max Codex / 5h
    icon: mdi:target
    entity_category: config
    optimistic: true
    restore_value: true
    min_value: 0
    max_value: ${codex_max_ktokens}
    step: 100
    mode: slider
    initial_value: 50000
    unit_of_measurement: ktokens

  - platform: template
    id: claude_daily_token_goal
    name: Max Claude / 5h
    icon: mdi:target
    entity_category: config
    optimistic: true
    restore_value: true
    min_value: 0
    max_value: ${claude_max_ktokens}
    step: 100
    mode: slider
    initial_value: 50000
    unit_of_measurement: ktokens

  - platform: template
    id: codex_5h_start_hour
    name: Codex 5h Start Hour
    icon: mdi:clock-start
    entity_category: config
    optimistic: true
    restore_value: true
    min_value: 0
    max_value: 24
    step: 1
    mode: slider
    initial_value: 0
    unit_of_measurement: h

  - platform: template
    id: codex_5h_start_minute
