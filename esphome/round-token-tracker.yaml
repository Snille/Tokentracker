# Shared Wi-Fi, API and OTA settings imported from a common base file.
<<: !include base/base-iot.yaml

# Substitutions: simple key/value tokens reused throughout the YAML via ${...}.
substitutions:
  name: round-token-tracker
  friendly_name: Storstugan - Office - Token Tracker

  # Home Assistant entity IDs that provide the account values (mirrored locally as sensors below).
  openai_week_tokens_entity: sensor.tokentracker_vs_code_codex_tokens_week
  openai_week_input_tokens_entity: sensor.tokentracker_vs_code_codex_input_tokens_week
  openai_week_cached_input_tokens_entity: sensor.tokentracker_vs_code_codex_cached_input_tokens_week
  openai_week_output_tokens_entity: sensor.tokentracker_vs_code_codex_output_tokens_week
  openai_week_reasoning_output_tokens_entity: sensor.tokentracker_vs_code_codex_reasoning_output_tokens_week
  anthropic_week_tokens_entity: sensor.tokentracker_vs_code_claude_code_tokens_week
  anthropic_week_input_tokens_entity: sensor.tokentracker_vs_code_claude_code_input_tokens_week
  anthropic_week_cache_creation_tokens_entity: sensor.tokentracker_vs_code_claude_code_cache_creation_tokens_week
  anthropic_week_cache_read_tokens_entity: sensor.tokentracker_vs_code_claude_code_cache_read_tokens_week
  anthropic_week_output_tokens_entity: sensor.tokentracker_vs_code_claude_code_output_tokens_week
  vscode_updated_at_epoch_entity: sensor.tokentracker_vs_code_updated_at_epoch
  openrouter_tokens_entity: sensor.openrouter_tokens_today
  openrouter_balance_entity: sensor.openrouter_balance_remaining
  openrouter_usage_percent_entity: sensor.openrouter_usage_percent
  openrouter_cost_today_entity: sensor.openrouter_cost_today
  openrouter_cost_week_entity: sensor.openrouter_cost_week
  openrouter_cost_month_entity: sensor.openrouter_cost_month
  openrouter_key_count_entity: sensor.openrouter_key_count
  openrouter_activity_prompt_tokens_entity: sensor.openrouter_activity_prompt_tokens
  openrouter_activity_completion_tokens_entity: sensor.openrouter_activity_completion_tokens
  openrouter_activity_reasoning_tokens_entity: sensor.openrouter_activity_reasoning_tokens
  openrouter_activity_tokens_entity: sensor.openrouter_activity_tokens
  openrouter_activity_requests_entity: sensor.openrouter_activity_requests
  openwebui_tokens_today_entity: sensor.openwebui_tokens_today
  openwebui_input_tokens_today_entity: sensor.openwebui_input_tokens_today
  openwebui_output_tokens_today_entity: sensor.openwebui_output_tokens_today
  openwebui_chats_today_entity: sensor.openwebui_chats_today
  openwebui_active_users_entity: sensor.openwebui_active_users
  openwebui_total_users_entity: sensor.openwebui_total_users
  openwebui_models_today_entity: sensor.openwebui_models_today
  openwebui_input_token_percent_today_entity: sensor.openwebui_input_token_percent_today
  openwebui_output_token_percent_today_entity: sensor.openwebui_output_token_percent_today
  openwebui_top_model_entity: sensor.openwebui_top_model

  # Maximum values for the HA config sliders below, expressed in ktokens
  # (1 ktoken = 1000 tokens). These only control how far the sliders can be
  # dragged; the current limit values are stored/restored by the number entities.
  codex_max_ktokens: "250000"
  claude_max_ktokens: "250000"
  openwebui_max_ktokens: "1250"

# Core ESPHome device configuration. Includes PlatformIO build flags for the
# ESP32-S3 (240 MHz CPU, 80 MHz flash in DIO mode) and an on_boot hook that
# auto-detects and initialises the QMI8658 IMU.
esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  platformio_options:
    board_build.flash_mode: dio
    board_build.f_flash: 80000000L
    board_build.f_cpu: 240000000L
  project:
    name: snille.token-tracker
    version: "1.10.0"
  on_boot:
    # Priority -100 = runs late, after hardware components have been set up.
    priority: -100
    then:
      - logger.log:
          level: INFO
          tag: tokentracker
          format: "TokenTracker ESPHome build 1.10.0: configurable Codex/Claude 5h windows"
      - lambda: |-
          float brightness_percent = id(display_brightness_percent).state;
          if (isnan(brightness_percent)) brightness_percent = 70.0f;
          if (brightness_percent < 1.0f) brightness_percent = 1.0f;
          if (brightness_percent > 100.0f) brightness_percent = 100.0f;
          id(main_display).set_brightness((uint8_t) (brightness_percent * 2.55f));

          // Probe both possible I2C addresses for the QMI8658 IMU. Some board
          // revisions wire the chip's SA0 pin differently, so try 0x6B first
          // and fall back to 0x6A.
          auto who_6b = id(qmi8658_i2c).read_byte(0x00);
          auto who_6a = id(qmi8658_i2c_alt).read_byte(0x00);
          if (who_6b.has_value()) {
            id(qmi8658_use_alt_address) = false;
            ESP_LOGI("tokentracker", "QMI8658 probe 0x6B WHO_AM_I=0x%02X", *who_6b);
          } else if (who_6a.has_value()) {
            id(qmi8658_use_alt_address) = true;
            ESP_LOGI("tokentracker", "QMI8658 probe 0x6A WHO_AM_I=0x%02X", *who_6a);
          } else {
            // Neither address responded -- IMU features will be unavailable.
            ESP_LOGE("tokentracker", "QMI8658 WHO_AM_I read failed at both 0x6B and 0x6A");
            return;
          }
          // Configure the IMU control registers for accel + gyro operation.
          if (id(qmi8658_use_alt_address)) {
            id(qmi8658_i2c_alt).write_byte(0x02, 0x40);  // CTRL1: address auto-increment, little-endian data.
            id(qmi8658_i2c_alt).write_byte(0x03, 0x26);  // CTRL2: accel +/-8g, 125Hz.
            id(qmi8658_i2c_alt).write_byte(0x04, 0x56);  // CTRL3: gyro +/-512dps, 125Hz.
            id(qmi8658_i2c_alt).write_byte(0x08, 0x03);  // CTRL7: enable accel + gyro.
            ESP_LOGI("tokentracker", "QMI8658 configured through generic i2c_device at 0x6A");
          } else {
            id(qmi8658_i2c).write_byte(0x02, 0x40);
            id(qmi8658_i2c).write_byte(0x03, 0x26);
            id(qmi8658_i2c).write_byte(0x04, 0x56);
            id(qmi8658_i2c).write_byte(0x08, 0x03);
            ESP_LOGI("tokentracker", "QMI8658 configured through generic i2c_device at 0x6B");
          }

# ESP32-S3 platform settings: 16 MB flash, ESP-IDF framework with a few
# performance-tuning sdkconfig overrides (240 MHz CPU, 64 KB / 64-byte data cache).
esp32:
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"

# Octal PSRAM at 80 MHz - needed to hold the 466x466 RGB framebuffer.
psram:
  mode: octal
  speed: 80MHz

# Default ESPHome logger over UART/USB. Keep generic sensor log lines quiet.
logger:
  logs:
    sensor: WARN

# Built-in HTTP server exposing entities and OTA on port 80.
web_server:

# External components pulled from GitHub. The CST9217 capacitive-touch driver
# is not part of the upstream ESPHome distribution.
external_components:
  - source:
      type: git
      url: https://github.com/shelson/esphome-cst9217

# Globals = persistent runtime variables shared between lambdas.
# Those with restore_value: true are saved to flash across reboots.
globals:
  # Index 0..7 of the screen currently displayed (clock / four providers / three overviews).
  - id: current_screen
    type: int
    restore_value: true
    initial_value: "0"
  # millis() timestamp of the last automatic screen change.
  - id: last_auto_advance_ms
    type: uint32_t
    restore_value: false
    initial_value: "0"
  # Tap gesture pauses/resumes the auto-rotate countdown without changing the
  # Home Assistant Auto Rotate Screens switch.
  - id: auto_rotate_paused
    type: bool
    restore_value: true
    initial_value: "false"
  # Touch swipe tracking: start and most recent touch coordinates.
  - id: swipe_start_x
    type: int
    restore_value: false
    initial_value: "0"
  - id: swipe_start_y
    type: int
    restore_value: false
    initial_value: "0"
  - id: swipe_last_x
    type: int
    restore_value: false
    initial_value: "0"
  - id: swipe_last_y
    type: int
    restore_value: false
    initial_value: "0"
  - id: touch_swipe_handled
    type: bool
    restore_value: false
    initial_value: "false"
  - id: touch_is_active
    type: bool
    restore_value: false
    initial_value: "false"
  - id: touch_started_ms
    type: uint32_t
    restore_value: false
    initial_value: "0"
  # User-selected base rotation in 90-degree steps (0..3). Persisted across reboots.
  - id: display_rotation_steps
    type: int
    restore_value: true
    initial_value: "0"
  # Last rotation actually applied to the display driver (-1 = none yet, forces a sync on first frame).
  - id: applied_display_rotation_steps
    type: int
    restore_value: false
    initial_value: "-1"
  # Additional rotation derived from the IMU when auto-orientation is enabled (0..3).
  - id: auto_orientation_steps
    type: int
    restore_value: false
    initial_value: "0"
  # Paint a black frame this many times at boot to avoid showing uninitialised framebuffer contents.
  - id: startup_black_frames
    type: int
    restore_value: false
    initial_value: "3"
  # Top-button state machine variables (press timestamp, click counter, hold-handled flag, etc.).
  - id: button_press_started_ms
    type: uint32_t
    restore_value: false
    initial_value: "0"
  - id: button_hold_handled
    type: bool
    restore_value: false
    initial_value: "false"
  - id: button_woke_display
    type: bool
    restore_value: false
    initial_value: "false"
  # Set in on_boot to remember which I2C address the IMU responded on.
  - id: qmi8658_use_alt_address
    type: bool
    restore_value: false
    initial_value: "false"
  # Throttles IMU sensor publishing to Home Assistant (10 s cadence, see interval below).
  - id: qmi8658_last_publish_ms
    type: uint32_t
    restore_value: false
    initial_value: "0"
  # 5h token-window tracking. Week counters come from the VS Code extension;
  # these baselines let the display derive the current configurable 5h bucket.
  - id: codex_period_index
    type: int
    restore_value: true
    initial_value: "-1"
  - id: claude_period_index
    type: int
    restore_value: true
    initial_value: "-1"
  - id: codex_period_anchor_ts
    type: int
    restore_value: true
    initial_value: "0"
  - id: claude_period_anchor_ts
    type: int
    restore_value: true
    initial_value: "0"
  - id: codex_period_start_minutes
    type: int
    restore_value: true
    initial_value: "-1"
  - id: claude_period_start_minutes
    type: int
    restore_value: true
    initial_value: "-1"
  - id: codex_period_total_baseline
    type: float
    restore_value: true
    initial_value: "0"
  - id: codex_period_input_baseline
    type: float
    restore_value: true
    initial_value: "0"
  - id: codex_period_cached_baseline
    type: float
    restore_value: true
    initial_value: "0"
  - id: codex_period_output_baseline
    type: float
    restore_value: true
    initial_value: "0"
  - id: codex_period_reasoning_baseline
    type: float
    restore_value: true
    initial_value: "0"
  - id: claude_period_total_baseline
    type: float
    restore_value: true
    initial_value: "0"
  - id: claude_period_input_baseline
    type: float
    restore_value: true
    initial_value: "0"
  - id: claude_period_cache_creation_baseline
    type: float
    restore_value: true
    initial_value: "0"
  - id: claude_period_cache_read_baseline
    type: float
    restore_value: true
    initial_value: "0"
  - id: claude_period_output_baseline
    type: float
    restore_value: true
    initial_value: "0"

# Pull the wall-clock time from Home Assistant (no RTC on this board).
time:
  - platform: homeassistant
    id: home_assistant_time

# Single I2C bus shared by the IMU. scan: false skips the boot-time bus scan
# since we probe the IMU manually in on_boot.
i2c:
  - id: bus_a
    scl: GPIO14
    sda: GPIO15
    scan: false

# Generic i2c_device entries used to talk to the IMU without a dedicated
# component. Both addresses are declared so on_boot can pick the live one.
i2c_device:
  - id: qmi8658_i2c
    i2c_id: bus_a
    address: 0x6B
  - id: qmi8658_i2c_alt
    i2c_id: bus_a
    address: 0x6A

# Quad-SPI bus to the CO5300 round display. Quad mode uses four data lines
# for higher throughput than standard 1-bit SPI.
spi:
  - id: display_qspi
    type: quad
    clk_pin: GPIO38
    data_pins:
      - GPIO4
      - GPIO5
      - GPIO6
      - GPIO7

# Google Fonts pulled at build time. Glyph lists are pruned to what we
# actually render to keep the compiled font tables small.
font:
  - file: gfonts://Inter@700
    id: font_title
    size: 38
    glyphs: "!%()+,-_.:/0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZÅÄÖabcdefghijklmnopqrstuvwxyzåäö$€ "
  - file: gfonts://Inter@600
    id: font_value
    size: 58
    glyphs: "!%()+,-_.:/0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZÅÄÖabcdefghijklmnopqrstuvwxyzåäö$€ "
  - file: gfonts://Inter@500
    id: font_label
    size: 24
    glyphs: "!%()+,-_.:/0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZÅÄÖabcdefghijklmnopqrstuvwxyzåäö$€ "
  - file: gfonts://Inter@600
    id: font_clock
    size: 74
    glyphs: "0123456789:"
  - file: gfonts://Inter@600
    id: font_small_value
    size: 30
    glyphs: "!%()+,-_.:/0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZÅÄÖabcdefghijklmnopqrstuvwxyzåäö$€ "
  - file: gfonts://Inter@500
    id: font_tiny
    size: 18
    glyphs: "!%()+,-_.:/0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZÅÄÖabcdefghijklmnopqrstuvwxyzåäö$€ "

