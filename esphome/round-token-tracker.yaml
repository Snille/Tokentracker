# Drop-down selector for manual base display rotation. The set_action maps the
# chosen string to a 0..3 step count consumed by the display lambda.
select:
  - platform: template
    id: display_rotation_select
    name: Display Rotation
    icon: mdi:screen-rotation
    entity_category: config
    optimistic: true
    restore_value: true
    options:
      - "0°"
      - "90°"
      - "180°"
      - "270°"
    initial_option: "0°"
    set_action:
      - lambda: |-
          if (x == "0°") id(display_rotation_steps) = 0;
          else if (x == "90°") id(display_rotation_steps) = 1;
          else if (x == "180°") id(display_rotation_steps) = 2;
          else id(display_rotation_steps) = 3;
      - component.update: main_display

# Buttons exposed to Home Assistant: device-level (reboot / factory reset) and
# UI-level next/previous which skip past any disabled screens.
button:
  - platform: restart
    id: reboot_btn
    name: Reboot Device
    icon: mdi:restart
    entity_category: config

  - platform: factory_reset
    id: factory_reset_btn
    name: Factory Reset
    icon: mdi:factory
    entity_category: config

  - platform: template
    id: next_screen_btn
    name: Next Screen
    icon: mdi:chevron-right
    on_press:
      - lambda: |-
          // Local helper: is this screen currently allowed by its toggle switch?
          auto enabled = [](int screen) -> bool {
            if (screen == 0) return id(show_clock).state;
            if (screen == 1) return id(show_openai).state;
            if (screen == 2) return id(show_anthropic).state;
            if (screen == 3) return id(show_openrouter).state;
            if (screen == 4) return id(show_openwebui).state;
            if (screen == 5) return id(show_overview).state;
            if (screen == 6) return id(show_overview).state;
            if (screen == 7) return id(show_overview).state;
            return false;
          };
          // Advance forward, stopping on the first enabled screen.
          for (int i = 0; i < 8; i++) {
            id(current_screen) = (id(current_screen) + 1) % 8;
            if (enabled(id(current_screen))) break;
          }
          id(last_auto_advance_ms) = millis();
      - component.update: main_display

  - platform: template
    id: previous_screen_btn
    name: Previous Screen
    icon: mdi:chevron-left
    on_press:
      - lambda: |-
          auto enabled = [](int screen) -> bool {
            if (screen == 0) return id(show_clock).state;
            if (screen == 1) return id(show_openai).state;
            if (screen == 2) return id(show_anthropic).state;
            if (screen == 3) return id(show_openrouter).state;
            if (screen == 4) return id(show_openwebui).state;
            if (screen == 5) return id(show_overview).state;
            if (screen == 6) return id(show_overview).state;
            if (screen == 7) return id(show_overview).state;
            return false;
          };
          // +7 mod 8 == -1 mod 8: walk one step backwards through the screens.
          for (int i = 0; i < 8; i++) {
            id(current_screen) = (id(current_screen) + 7) % 8;
            if (enabled(id(current_screen))) break;
          }
          id(last_auto_advance_ms) = millis();
      - component.update: main_display

# Switches grouped into: behaviour toggles (auto_rotate, display_enabled,
